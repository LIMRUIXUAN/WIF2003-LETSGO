<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoPlanner – My Itinerary</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/planner.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     PLANNER PAGE  —  Owner: Julius Lim Jun Herng
     ═══════════════════════════════════════════════════════════ -->

<!-- Create Itinerary Modal -->
<div id="createItinModal" class="eco-modal-backdrop" style="display:none;">
  <div class="eco-modal">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h5 class="section-title mb-0" style="font-size:1.2rem;">New Itinerary</h5>
      <button onclick="closeModal('createItinModal')" class="btn-close"></button>
    </div>
    <div class="form-group">
      <label class="form-label">Trip Name</label>
      <input class="form-control-eco" placeholder="e.g. Langkawi Eco Escape" id="itinName">
    </div>
    <div class="form-group">
      <label class="form-label">Destination</label>
      <input class="form-control-eco" placeholder="City or town" id="itinCity">
    </div>
    <div class="row g-3">
      <div class="col-6">
        <label class="form-label">Start Date</label>
        <input type="date" class="form-control-eco" id="itinStart">
      </div>
      <div class="col-6">
        <label class="form-label">End Date</label>
        <input type="date" class="form-control-eco" id="itinEnd">
      </div>
    </div>
    <div class="form-group mt-3">
      <label class="form-label">Travel Style</label>
      <select class="form-control-eco" id="itinStyle">
        <option>Budget Eco (&lt; RM 100/day)</option>
        <option>Mid-range Green (RM 100–300/day)</option>
        <option>Eco Luxury (RM 300+/day)</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Interests</label>
      <div class="d-flex gap-2 flex-wrap mt-1">
        <button class="filter-chip active" onclick="toggleChip(this)">Nature</button>
        <button class="filter-chip" onclick="toggleChip(this)">Food</button>
        <button class="filter-chip" onclick="toggleChip(this)">Culture</button>
        <button class="filter-chip" onclick="toggleChip(this)">Adventure</button>
      </div>
    </div>
    <button class="btn-eco w-100 mt-3" style="justify-content:center;" onclick="createItinerary()">
      <i class="bi bi-plus-circle"></i> Create Itinerary
    </button>
  </div>
</div>

<!-- Top Navigation Bar -->
<nav class="eco-nav d-flex align-items-center justify-content-between">
  <a href="index.html" class="brand"><span class="leaf">🌿</span> EcoPlanner</a>
  <div class="nav-links d-none d-md-flex">
    <a class="nav-link"        href="index.html"><i class="bi bi-house"></i>Home</a>
    <a class="nav-link"        href="explore.html"><i class="bi bi-compass"></i>Explore</a>
    <a class="nav-link active" href="planner.html"><i class="bi bi-map"></i>Itinerary</a>
    <a class="nav-link"        href="carbon-weather.html"><i class="bi bi-cloud-sun"></i>Weather</a>
    <a class="nav-link"        href="carbon-weather.html"><i class="bi bi-bar-chart"></i>Carbon</a>
    <a class="nav-link"        href="favorites.html"><i class="bi bi-heart"></i>Favorites</a>
  </div>
  <div class="d-flex align-items-center gap-3">
    <div class="user-badge" onclick="window.location.href='profile.html'" id="navInitial">?</div>
  </div>
</nav>

<div class="dash-layout">

  <!-- Sidebar -->
  <div class="dash-sidebar d-none d-lg-block">
    <div class="section-label">Main</div>
    <a class="sidebar-link"        href="index.html"><i class="bi bi-house-fill"></i>Dashboard</a>
    <a class="sidebar-link"        href="explore.html"><i class="bi bi-compass-fill"></i>Explore</a>
    <a class="sidebar-link active" href="planner.html"><i class="bi bi-map-fill"></i>My Itinerary</a>
    <div class="section-label">Tools</div>
    <a class="sidebar-link" href="carbon-weather.html"><i class="bi bi-cloud-sun-fill"></i>Weather</a>
    <a class="sidebar-link" href="carbon-weather.html"><i class="bi bi-bar-chart-fill"></i>Carbon Calc</a>
    <a class="sidebar-link" href="favorites.html"><i class="bi bi-heart-fill"></i>Favorites</a>
    <div class="section-label">Account</div>
    <a class="sidebar-link" href="profile.html"><i class="bi bi-person-fill"></i>Profile</a>
    <a class="sidebar-link" href="index.html" style="color:#c0392b;"><i class="bi bi-box-arrow-right"></i>Logout</a>
  </div>

  <!-- Main Content -->
  <div class="dash-main">
    <div class="toast-wrap" id="toastWrap"></div>

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
      <div>
        <h4 class="section-title mb-0">My Green Itineraries</h4>
        <p class="section-sub">Plan, edit and manage your eco travel plans</p>
      </div>
      <button class="btn-eco" onclick="openModal('createItinModal')">
        <i class="bi bi-plus-circle"></i> New Itinerary
      </button>
    </div>
    <!-- Itinerary list (populated by planner.js) -->
    <div id="itineraryList"></div>

  </div><!-- /dash-main -->
</div><!-- /dash-layout -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script src="js/planner.js"></script>
</body>
</html>
