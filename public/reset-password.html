<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoPlanner - Reset Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="toast-wrap" id="toastWrap"></div>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="logo">
        <img src="images/logo_letsgo.png" alt="LET's GO logo">
      </div>
      <p class="tagline">Verify your email before changing your password</p>

      <div class="form-group">
        <label class="form-label">Account Email</label>
        <div class="reset-email-row">
          <input type="email" class="form-control-eco" placeholder="you@email.com" id="resetEmail">
          <button class="btn-eco reset-code-btn" id="btnSendResetCode" onclick="requestPasswordResetCode()">
            Send Code
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">6-Digit Verification Code</label>
        <input type="text" class="form-control-eco reset-pin-input" placeholder="123456" id="resetCode"
          inputmode="numeric" maxlength="6" autocomplete="one-time-code">
      </div>

      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" class="form-control-eco" placeholder="Min. 8 characters" id="resetNewPw">
      </div>

      <div class="form-group">
        <label class="form-label">Re-enter New Password</label>
        <input type="password" class="form-control-eco" placeholder="Repeat your new password" id="resetConfirmPw">
      </div>

      <button class="btn-eco w-100 mt-2" id="btnResetPassword" style="justify-content:center;" onclick="resetPassword()">
        <i class="bi bi-shield-lock"></i> Reset Password
      </button>

      <div class="divider">
        <hr><span>remembered it?</span>
        <hr>
      </div>

      <a href="login.html" class="btn-eco-outline w-100" style="justify-content:center; text-decoration:none;">
        Back to Sign In
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
