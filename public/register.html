<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoPlanner – Create Account</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- ═══════════════════════════════════════════════════════════
     REGISTER PAGE  —  Owner: Cha Zi Yu
     ═══════════════════════════════════════════════════════════ -->
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="logo">
        <img src="images/logo_letsgo.png" alt="LET's GO logo">
      </div>
      <p class="tagline">Join 12,000+ green travelers worldwide</p>

      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-control-eco" placeholder="e.g. Ahmad Razif" id="regName">
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control-eco" placeholder="you@email.com" id="regEmail">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control-eco" placeholder="Min. 8 characters" id="regPw">
      </div>
      <div class="form-group">
        <label class="form-label">Travel Interests</label>
        <div class="d-flex gap-2 flex-wrap mt-1">
          <button class="filter-chip" onclick="toggleChip(this)">🏞 Nature</button>
          <button class="filter-chip" onclick="toggleChip(this)">🍃 Vegan Food</button>
          <button class="filter-chip" onclick="toggleChip(this)">🚲 Cycling</button>
          <button class="filter-chip" onclick="toggleChip(this)">🏔 Hiking</button>
          <button class="filter-chip" onclick="toggleChip(this)">🌊 Marine</button>
        </div>
      </div>

      <button class="btn-eco w-100 mt-2 style-c157e3" onclick="doRegister()">
        <i class="bi bi-person-plus"></i> Create Account
      </button>
      <div class="divider">
        <hr><span>already a member?</span>
        <hr>
      </div>
      <a href="login.html" class="btn-eco-outline w-100 style-4b226e">Sign In
        Instead</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
