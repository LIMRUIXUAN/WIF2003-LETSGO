<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoPlanner – Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- ═══════════════════════════════════════════════════════════
     REGISTER PAGE
     ═══════════════════════════════════════════════════════════ -->
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="logo">
        <img src="images/logo_letsgo.png" alt="LET's GO logo">
      </div>
      <p class="tagline">Create your eco traveler account</p>

      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control-eco" placeholder="Your name" id="regName">
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control-eco" placeholder="you@email.com" id="regEmail">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control-eco" placeholder="Min. 8 characters" id="regPw">
      </div>
      <div class="form-group mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control-eco" placeholder="Repeat your password" id="regConfirmPw">
      </div>

      <button class="btn-eco w-100 mb-3" style="justify-content:center;" onclick="doRegister()">
        <i class="bi bi-person-plus"></i> Sign Up
      </button>

      <div class="text-center">
        <span style="font-size:.85rem; color:#4a5e4f;">Already have an account? <a href="login.html" style="color:var(--eco-green); text-decoration:none; font-weight:500;">Sign In</a></span>
      </div>

    </div>
  </div>

  <footer class="text-center py-4 mt-5" style="border-top: 1px solid rgba(0,0,0,0.05);">
    <div class="container">
      <p class="mb-0" style="color: #9ab3a0; font-size: 0.9rem;">
        &copy; 2026 EcoPlanner.<br>
        Designed and developed by LIM RUI XUAN, CHA ZI YU, JULIUS LIM JUN HERNG, CHIN KIN HIUNG, TAN JIN XIANG, YE
        QINGLAN.
      </p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
