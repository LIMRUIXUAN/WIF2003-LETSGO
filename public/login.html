<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPlanner – Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
  </head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     LOGIN PAGE  —  Owner: Cha Zi Yu
     ═══════════════════════════════════════════════════════════ -->
<div class="auth-wrap">
  <div class="auth-card">
    <div class="logo">🌿 EcoPlanner</div>
    <p class="tagline">Welcome back, eco traveler</p>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-control-eco" placeholder="you@email.com"
             id="loginEmail" value="demo@ecoplanner.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-control-eco" placeholder="Your password"
             id="loginPw" value="password123">
    </div>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <label style="font-size:.82rem; color:#4a5e4f; cursor:pointer;">
        <input type="checkbox" style="margin-right:5px;"> Remember me
      </label>
      <a href="#" style="font-size:.82rem; color:var(--eco-green); text-decoration:none;">Forgot password?</a>
    </div>

    <button class="btn-eco w-100" style="justify-content:center;" onclick="doLogin()">
      <i class="bi bi-box-arrow-in-right"></i> Sign In
    </button>
    <div class="divider"><hr><span>new here?</span><hr></div>
    <a href="register.html" class="btn-eco-outline w-100" style="justify-content:center; text-decoration:none;">Create Free Account</a>
  </div>
</div>

<footer class="text-center py-4 mt-5" style="border-top: 1px solid rgba(0,0,0,0.05);">
  <div class="container">
    <p class="mb-0" style="color: #9ab3a0; font-size: 0.9rem;">
      &copy; 2026 EcoPlanner.<br>
      Designed and developed by LIM RUI XUAN, CHA ZI YU, JULIUS LIM JUN HERNG, CHIN KIN HIUNG, TAN JIN XIANG, YE QINGLAN.
    </p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
